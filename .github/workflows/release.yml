name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer to release, for example 0.1.0 or v0.1.0."
        required: true
        type: string
      target_branch:
        default: main
        description: "Branch to release from."
        required: true
        type: string
      prerelease:
        default: false
        description: "Mark the GitHub release as a prerelease. SemVer prerelease versions do this automatically."
        required: false
        type: boolean
      draft:
        default: false
        description: "Create the GitHub release as a draft."
        required: false
        type: boolean
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_branch || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare release metadata
        id: release
        env:
          RELEASE_DRAFT: ${{ inputs.draft || false }}
          RELEASE_PRERELEASE: ${{ inputs.prerelease || false }}
          RELEASE_TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
          RELEASE_VERSION: ${{ inputs.version || '' }}
        run: bun run release:prepare

      - name: Check release availability
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          if git rev-parse --verify --quiet "refs/tags/$TAG_NAME" >/dev/null; then
            echo "::error::Tag $TAG_NAME already exists."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "::error::GitHub release $TAG_NAME already exists."
            exit 1
          fi

      - name: Verify
        run: bun run verify

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          tracked_changes="$(git status --porcelain --untracked-files=no)"
          if [ -n "$tracked_changes" ]; then
            echo "::error::Unexpected tracked changes before tagging."
            git status --short
            exit 1
          fi

          git tag -a "$TAG_NAME" -m "$TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Create GitHub release
        env:
          DRAFT_FLAG: ${{ steps.release.outputs.draft == 'true' && '--draft' || '' }}
          PRERELEASE_FLAG: ${{ steps.release.outputs.prerelease == 'true' && '--prerelease' || '' }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG_NAME" \
            --generate-notes \
            --title "$TAG_NAME" \
            --verify-tag \
            $PRERELEASE_FLAG \
            $DRAFT_FLAG
