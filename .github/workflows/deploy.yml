name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      MAIL_BIN_APP_ENV: production
      MAIL_BIN_D1_DATABASE_ID: ${{ secrets.MAIL_BIN_D1_DATABASE_ID }}
      MAIL_BIN_D1_DATABASE_NAME: ${{ vars.MAIL_BIN_D1_DATABASE_NAME }}
      MAIL_BIN_WORKER_NAME: ${{ vars.MAIL_BIN_WORKER_NAME }}
      WRANGLER_CONFIG: .wrangler/generated/wrangler.jsonc
    steps:
      - name: Check deployment configuration
        id: deploy_config
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$MAIL_BIN_D1_DATABASE_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy. Configure CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN, and MAIL_BIN_D1_DATABASE_ID repository secrets."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/checkout@v6

      - name: Set up Node.js
        if: steps.deploy_config.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up Bun
        if: steps.deploy_config.outputs.ready == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        if: steps.deploy_config.outputs.ready == 'true'
        run: bun install --frozen-lockfile

      - name: Generate Wrangler config
        if: steps.deploy_config.outputs.ready == 'true'
        run: bun run cf:config:write

      - name: Verify
        if: steps.deploy_config.outputs.ready == 'true'
        run: bun run verify

      - name: Apply D1 migrations
        if: steps.deploy_config.outputs.ready == 'true'
        run: bun run db:migrate:remote

      - name: Deploy
        if: steps.deploy_config.outputs.ready == 'true'
        run: bun run deploy
