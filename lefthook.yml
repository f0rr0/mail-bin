pre-commit:
  jobs:
    - run: bun x ultracite fix {staged_files}
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true

commit-msg:
  jobs:
    - run: bun run commitlint -- {1}

pre-push:
  jobs:
    - run: bun run typecheck
    - run: bun run test
    - run: bun run lint:type-aware
